<title>Mundial 2026 — Horarios Monterrey</title>

<style>
  :root {
    --verde: #00b140;
    --rojo: #da291c;
    --oro: #f5c518;
    --azul: #003087;
    --negro: #0a0a0a;
    --gris: #1a1a1a;
    --gris2: #2a2a2a;
    --gris3: #3a3a3a;
    --texto: #e8e8e8;
    --texto2: #999;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--negro); color: var(--texto); font-family: 'Barlow', sans-serif; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
    border-bottom: 3px solid var(--verde);
    padding: 22px 20px 14px;
    text-align: center;
    position: relative;
  }
  header::before {
    content: '';
    position: absolute; top:0;left:0;right:0;bottom:0;
    background: repeating-linear-gradient(-45deg,transparent,transparent 10px,rgba(255,255,255,.012) 10px,rgba(255,255,255,.012) 11px);
    pointer-events: none;
  }
  .header-flags { display:flex; justify-content:center; gap:8px; margin-bottom:8px; font-size:26px; }
  h1 {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(2.2rem,6vw,3.8rem);
    letter-spacing: 4px;
    background: linear-gradient(90deg, var(--verde), var(--oro), var(--rojo));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1; margin-bottom: 4px;
  }
  .subtitle { font-family:'Barlow Condensed',sans-serif; font-size:.95rem; color:var(--texto2); letter-spacing:3px; text-transform:uppercase; }
  .badge { display:inline-block; background:var(--verde); color:#000; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:.7rem; letter-spacing:1px; padding:3px 10px; border-radius:2px; margin-top:8px; }

  /* FILTERS */
  .filters-wrap { background:var(--gris); border-bottom:1px solid var(--gris3); position:sticky; top:0; z-index:100; }
  .filters-row { display:flex; gap:6px; flex-wrap:wrap; align-items:center; justify-content:center; padding:10px 14px 0; }
  .filters-dates { display:flex; gap:5px; flex-wrap:wrap; align-items:center; justify-content:center; padding:8px 14px 10px; border-top:1px solid var(--gris2); overflow-x:auto; }
  
  .filter-btn {
    background:var(--gris2); border:1px solid var(--gris3); color:var(--texto2);
    padding:6px 13px; border-radius:3px;
    font-family:'Barlow Condensed',sans-serif; font-size:.82rem; font-weight:700; letter-spacing:.8px;
    cursor:pointer; transition:all .15s; text-transform:uppercase; white-space:nowrap;
  }
  .filter-btn:hover { background:var(--gris3); color:var(--texto); }
  .filter-btn.active { background:var(--verde); border-color:var(--verde); color:#000; }
  .filter-btn.date-btn { font-size:.75rem; padding:5px 10px; }
  .filter-btn.date-btn.active { background:var(--oro); border-color:var(--oro); color:#000; }

  .search-box {
    background:var(--gris2); border:1px solid var(--gris3); color:var(--texto);
    padding:6px 12px; border-radius:3px; font-family:'Barlow',sans-serif; font-size:.82rem;
    outline:none; width:160px;
  }
  .search-box:focus { border-color:var(--verde); }
  .search-box::placeholder { color:var(--texto2); }

  /* MAIN */
  main { padding:16px; max-width:860px; margin:0 auto; }

  .stats-bar {
    background:var(--gris); border:1px solid var(--gris2); border-radius:4px;
    padding:12px 16px; display:flex; gap:22px; flex-wrap:wrap; margin-bottom:18px; justify-content:center;
  }
  .stat { text-align:center; }
  .stat-num { font-family:'Bebas Neue',cursive; font-size:1.7rem; color:var(--verde); line-height:1; }
  .stat-label { font-family:'Barlow Condensed',sans-serif; font-size:.62rem; letter-spacing:1.5px; color:var(--texto2); text-transform:uppercase; }

  /* DAY BLOCK */
  .day-block { margin-bottom:10px; }
  .day-label {
    font-family:'Barlow Condensed',sans-serif; font-size:.78rem; font-weight:700;
    letter-spacing:2px; color:var(--texto2); text-transform:uppercase;
    padding:10px 0 5px; border-bottom:1px solid var(--gris2); margin-bottom:5px;
    display:flex; align-items:center; gap:8px;
  }
  .day-label .day-num {
    font-family:'Bebas Neue',cursive; font-size:1.5rem; color:var(--texto);
    letter-spacing:1px; line-height:1;
  }
  .day-label .day-count {
    margin-left:auto; font-size:.65rem; color:var(--gris3);
    background:var(--gris2); padding:2px 7px; border-radius:2px;
  }

  /* MATCH CARD */
  .match {
    display:grid; grid-template-columns:68px 1fr auto;
    align-items:center; gap:10px;
    background:var(--gris); border:1px solid var(--gris2); border-left:3px solid var(--gris3);
    border-radius:4px; padding:9px 12px; margin-bottom:4px;
    transition:all .12s; cursor:default;
  }
  .match:hover { background:var(--gris2); border-left-color:var(--verde); transform:translateX(2px); }
  .match.hl-mexico { border-left-color:#00b140 !important; background:rgba(0,177,64,.05) !important; }
  .match.hl-argentina { border-left-color:#74acdf !important; background:rgba(116,172,223,.05) !important; }
  .match.hl-brasil { border-left-color:#f5c518 !important; background:rgba(245,197,24,.04) !important; }
  .match.hl-espana { border-left-color:#da291c !important; background:rgba(218,41,28,.05) !important; }
  .match.hl-francia { border-left-color:#003087 !important; background:rgba(0,48,135,.05) !important; }
  .match.hl-alemania { border-left-color:#aaa !important; background:rgba(200,200,200,.04) !important; }

  .match-time { font-family:'Bebas Neue',cursive; font-size:1.35rem; color:var(--verde); letter-spacing:1px; line-height:1.1; }
  .match-time .ampm { font-family:'Barlow Condensed',sans-serif; font-size:.65rem; font-weight:700; color:var(--texto2); letter-spacing:1px; display:block; }
  .match-teams { display:flex; flex-direction:column; gap:1px; }
  .teams-row { font-family:'Barlow Condensed',sans-serif; font-size:1rem; font-weight:700; letter-spacing:.3px; color:var(--texto); }
  .vs-sep { color:var(--texto2); font-weight:400; font-size:.82rem; margin:0 5px; }
  .match-meta { font-size:.68rem; color:var(--texto2); margin-top:2px; }
  .match-tag {
    font-family:'Barlow Condensed',sans-serif; font-size:.68rem; font-weight:700;
    letter-spacing:.8px; padding:3px 8px; border-radius:2px; white-space:nowrap; text-align:center;
  }
  .tag-group { color:var(--oro); background:rgba(245,197,24,.09); border:1px solid rgba(245,197,24,.2); }
  .tag-knockout { color:#f0a0a0; background:rgba(218,41,28,.09); border:1px solid rgba(218,41,28,.22); }
  .tag-final { color:#fff; background:rgba(218,41,28,.3); border:1px solid rgba(218,41,28,.5); font-size:.75rem; }

  .no-results { text-align:center; color:var(--texto2); padding:40px; font-family:'Barlow Condensed',sans-serif; font-size:1.1rem; letter-spacing:2px; display:none; }

  footer { text-align:center; padding:18px; color:var(--texto2); font-size:.72rem; letter-spacing:1px; border-top:1px solid var(--gris2); margin-top:24px; }

  @media(max-width:500px){
    .match { grid-template-columns:58px 1fr auto; gap:7px; padding:8px 9px; }
    .match-time { font-size:1.15rem; }
    .teams-row { font-size:.9rem; }
  }
</style>
</head>

// Note: Jun 24 has a duplicate/conflict in some sources for Grupo E (already in Jun 25).
// Per ESPN Deportes the Jun 25 times are the correct Jornada 3 for groups E,F,D.
// I've kept Jun 24 entries for Group E which appear in worldcuppass but cross-checked
// Jun 25 is correct per ESPN. Removed duplicates: keeping ESPN as authority for MTY times.

// Remove the duplicate Jun 24 group E entries (they appear in worldcuppass but ESPN
// places group E jornada 3 on Jun 25). Let me keep worldcuppass version and note discrepancy.

let activePhase = 'all';
let activeDate = null;
let activeSearch = '';

function tagClass(tag, hl) {
  if (hl === 'final') return 'tag-final';
  if (tag.includes('Grupo')) return 'tag-group';
  return 'tag-knockout';
}

function hlClass(hl) {
  if (!hl) return '';
  return 'hl-' + hl;
}

function filtered() {
  return M.filter(m => {
    const [dk,,,,,,t1,t2,,tag,phase,hl] = m;
    if (activePhase === 'group' && phase !== 'group') return false;
    if (activePhase === 'knockout' && phase !== 'knockout') return false;
    if (activeDate && dk !== activeDate) return false;
    if (activeSearch) {
      const s = activeSearch.toLowerCase();
      if (!(t1+' '+t2).toLowerCase().includes(s)) return false;
    }
    return true;
  });
}

function render() {
  const data = filtered();
  const content = document.getElementById('content');
  const noResults = document.getElementById('noResults');
  content.innerHTML = '';
  if (!data.length) { noResults.style.display='block'; return; }
  noResults.style.display = 'none';

  // group by dateKey
  const days = {};
  for (const m of data) {
    if (!days[m[0]]) days[m[0]] = { label: m[1], matches: [] };
    days[m[0]].matches.push(m);
  }

  for (const [dk, day] of Object.entries(days)) {
    const db = document.createElement('div');
    db.className = 'day-block';
    const cnt = day.matches.length;
    db.innerHTML = `<div class="day-label">
      <span class="day-num">${day.label}</span>
      <span class="day-count">${cnt} partido${cnt>1?'s':''}</span>
    </div>`;

    // sort matches within day by sortMin
    day.matches.sort((a,b) => a[2]-b[2]);

    for (const m of day.matches) {
      const [dk2,dl,sortMin,h,min,ap,t1,t2,venue,tag,phase,hl] = m;
      const minStr = String(min).padStart(2,'0');
      const teamsLine = t2 ? `${t1}<span class="vs-sep">vs</span>${t2}` : t1;
      const tc = tagClass(tag, hl);
      const hc = hlClass(hl);
      const card = document.createElement('div');
      card.className = `match ${hc}`;
      card.innerHTML = `
        <div class="match-time">${h}:${minStr}<span class="ampm">${ap}</span></div>
        <div class="match-teams">
          <div class="teams-row">${teamsLine}</div>
          <div class="match-meta">📍 ${venue}</div>
        </div>
        <div class="match-tag ${tc}">${tag}</div>
      `;
      db.appendChild(card);
    }
    content.appendChild(db);
  }
}

function buildDateFilters() {
  const wrap = document.getElementById('dateFilters');
  // gather unique dates
  const seen = new Set();
  const dates = [];
  for (const m of M) {
    if (!seen.has(m[0])) { seen.add(m[0]); dates.push([m[0], m[1]]); }
  }
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn date-btn active';
  allBtn.id = 'dateAll';
  allBtn.textContent = 'Todas las fechas';
  allBtn.onclick = () => {
    activeDate = null;
    document.querySelectorAll('.date-btn').forEach(b=>b.classList.remove('active'));
    allBtn.classList.add('active');
    render();
  };
  wrap.appendChild(allBtn);

  for (const [dk, dl] of dates) {
    const btn = document.createElement('button');
    btn.className = 'filter-btn date-btn';
    // short label: "11 Jun", "12 Jun", etc.
    const parts = dl.split(' ');
    btn.textContent = parts[1]+' '+parts[2];
    btn.onclick = () => {
      activeDate = dk;
      document.querySelectorAll('.date-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      render();
    };
    wrap.appendChild(btn);
  }
}

function setPhase(p, btn) {
  activePhase = p; activeSearch = ''; activeDate = null;
  document.querySelector('.search-box').value = '';
  document.querySelectorAll('.filter-btn:not(.date-btn)').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.date-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('dateAll').classList.add('active');
  render();
}

function setTeam(t, btn) {
  activeSearch = t; activePhase = 'all'; activeDate = null;
  document.querySelector('.search-box').value = t;
  document.querySelectorAll('.filter-btn:not(.date-btn)').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.date-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('dateAll').classList.add('active');
  render();
}

function doSearch(v) {
  activeSearch = v; activePhase = 'all'; activeDate = null;
  document.querySelectorAll('.filter-btn:not(.date-btn)').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.filter-btn:not(.date-btn)')[0].classList.add('active');
  document.querySelectorAll('.date-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('dateAll').classList.add('active');
  render();
}

buildDateFilters();
render();
</script>
